<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pushup Counter Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=Orbitron:wght@700;800;900&display=swap');
    :root {
      --red: #ff2b2b;
      --text: rgba(255,255,255,.94);
      --line: rgba(255,255,255,.20);
      --track: rgba(255,255,255,.16);
      --shadow: rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .hud {
      width: min(78vmin, 760px);
      aspect-ratio: 1 / 1;
      border-radius: 58px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 54px 58px 48px;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: 0 30px 90px var(--shadow), inset 0 1px 0 rgba(255,255,255,.28), inset 0 -1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(22px) saturate(125%);
      -webkit-backdrop-filter: blur(22px) saturate(125%);
      transition: background .35s ease, color .35s ease, border-color .35s ease;
    }
    .hud.dark {
      background:
        radial-gradient(circle at 22% 8%, rgba(255,255,255,.18), transparent 25%),
        radial-gradient(circle at 75% 100%, rgba(255, 43, 43, .16), transparent 32%),
        linear-gradient(145deg, rgba(4, 6, 9, .82), rgba(16, 18, 23, .58));
    }
    .hud.light {
      --text: rgba(8,10,13,.94);
      --line: rgba(255,255,255,.72);
      --track: rgba(0,0,0,.17);
      --shadow: rgba(0,0,0,.22);
      background:
        radial-gradient(circle at 22% 8%, rgba(255,255,255,.96), transparent 30%),
        radial-gradient(circle at 84% 100%, rgba(255, 43, 43, .10), transparent 32%),
        linear-gradient(145deg, rgba(255,255,255,.70), rgba(238,242,246,.46));
    }
    .hud::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255,255,255,.22), transparent 24%, transparent 68%, rgba(255,255,255,.09)),
        linear-gradient(to bottom, rgba(255,255,255,.08), transparent 42%);
      pointer-events: none;
    }
    .hud::after {
      content: "";
      position: absolute;
      inset: 20px;
      border-radius: 44px;
      border: 1px solid rgba(255,255,255,.08);
      pointer-events: none;
    }
    .inner {
      position: relative;
      z-index: 2;
      width: 100%;
      text-align: center;
    }
    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 34px;
      font-size: clamp(18px, 3vmin, 30px);
      letter-spacing: .28em;
      font-weight: 800;
      white-space: nowrap;
    }
    .eyebrow::before, .eyebrow::after {
      content: "";
      width: 64px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red));
      box-shadow: 0 0 12px rgba(255, 43, 43, 0.45);
    }
    .eyebrow::after { background: linear-gradient(90deg, var(--red), transparent); }
    .digits {
      font-family: Orbitron, monospace;
      font-size: clamp(82px, 16vmin, 164px);
      line-height: .82;
      letter-spacing: .035em;
      color: var(--red);
      text-shadow: 0 0 12px rgba(255,43,43,.70), 0 0 34px rgba(255,43,43,.38), 0 0 78px rgba(255,43,43,.18);
      transition: transform .12s ease, text-shadow .12s ease;
      font-variant-numeric: tabular-nums;
    }
    .digits.bump {
      transform: scale(1.035);
      text-shadow: 0 0 20px rgba(255,43,43,.98), 0 0 54px rgba(255,43,43,.62), 0 0 110px rgba(255,43,43,.28);
    }
    .sub {
      margin-top: 30px;
      color: var(--red);
      font-size: clamp(15px, 2.25vmin, 22px);
      letter-spacing: .32em;
      font-weight: 800;
    }
    .bar-wrap { margin-top: 48px; width: 100%; }
    .bar {
      width: 100%;
      height: 27px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--track);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 8px rgba(0,0,0,.28);
    }
    .fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.12) 0 9px, transparent 9px 18px),
        linear-gradient(90deg, #ff1515, #ff3d3d);
      box-shadow: 0 0 22px rgba(255,43,43,.58);
      transition: width .35s cubic-bezier(.2,.9,.2,1);
    }
    .meta {
      margin-top: 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 22px;
      color: var(--text);
      font-size: clamp(22px, 4.1vmin, 38px);
      font-weight: 700;
      letter-spacing: .035em;
      font-variant-numeric: tabular-nums;
    }
    .percent {
      color: var(--red);
      text-shadow: 0 0 18px rgba(255,43,43,.28);
    }
    .milestone {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      background: radial-gradient(circle, rgba(255,43,43,.24), transparent 58%);
      opacity: 0;
      pointer-events: none;
      transform: scale(.96);
      transition: opacity .25s ease, transform .25s ease;
    }
    .milestone.show { opacity: 1; transform: scale(1); }
    .milestone-card {
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 28px;
      padding: 24px 34px;
      background: rgba(8,10,14,.76);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: white;
      box-shadow: 0 22px 70px rgba(0,0,0,.38);
    }
    .milestone-card b {
      display: block;
      font-size: 38px;
      color: var(--red);
      letter-spacing: .12em;
      text-shadow: 0 0 24px rgba(255,43,43,.6);
    }
    .milestone-card span {
      display: block;
      margin-top: 7px;
      font-size: 15px;
      letter-spacing: .24em;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="stage">
    <section id="hud" class="hud dark">
      <div class="milestone" id="milestone">
        <div class="milestone-card">
          <b id="milestoneText">1000</b>
          <span>MILESTONE HIT</span>
        </div>
      </div>
      <div class="inner">
        <div class="eyebrow">PUSHUP COUNTER</div>
        <div class="digits" id="count">00000</div>
        <div class="sub">PUSHUPS COMPLETED</div>
        <div class="bar-wrap"><div class="bar"><div class="fill" id="fill"></div></div></div>
        <div class="meta">
          <div id="ratio">0 / 10,000</div>
          <div class="percent" id="percent">0.0%</div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA4NYD9D6ZNbWkfrAm8pLBTqq33ajnKHTY",
      authDomain: "pushups-counter-72738.firebaseapp.com",
      databaseURL: "https://pushups-counter-72738-default-rtdb.firebaseio.com",
      projectId: "pushups-counter-72738",
      storageBucket: "pushups-counter-72738.firebasestorage.app",
      messagingSenderId: "935751593854",
      appId: "1:935751593854:web:16be8798a1e91519b78d2f"
    };

    const params = new URLSearchParams(window.location.search);
    const room = params.get("room") || "brad-pushups";
    const defaultState = { count: 0, goal: 10000, theme: "dark", updatedAt: Date.now() };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const roomRef = ref(db, `rooms/${room}/pushups`);

    const hud = document.getElementById("hud");
    const countEl = document.getElementById("count");
    const ratioEl = document.getElementById("ratio");
    const percentEl = document.getElementById("percent");
    const fillEl = document.getElementById("fill");
    const milestoneEl = document.getElementById("milestone");
    const milestoneText = document.getElementById("milestoneText");

    let lastCount = null;
    let lastMilestone = 0;

    const formatNumber = (n) => Number(n || 0).toLocaleString("en-US");
    const padded = (n) => String(Math.max(0, Number(n || 0))).padStart(5, "0");

    function showMilestone(value) {
      milestoneText.textContent = formatNumber(value);
      milestoneEl.classList.add("show");
      setTimeout(() => milestoneEl.classList.remove("show"), 1500);
    }

    function render(state = defaultState) {
      const count = Math.max(0, Number(state.count || 0));
      const goal = Math.max(1, Number(state.goal || 10000));
      const theme = state.theme === "light" ? "light" : "dark";
      const percent = Math.min(100, (count / goal) * 100);

      hud.classList.toggle("light", theme === "light");
      hud.classList.toggle("dark", theme !== "light");

      countEl.textContent = padded(count);
      ratioEl.textContent = `${formatNumber(count)} / ${formatNumber(goal)}`;
      percentEl.textContent = `${percent.toFixed(1)}%`;
      fillEl.style.width = `${percent}%`;

      if (lastCount !== null && count !== lastCount) {
        countEl.classList.add("bump");
        setTimeout(() => countEl.classList.remove("bump"), 150);
      }

      const milestone = Math.floor(count / 1000) * 1000;
      if (lastCount !== null && milestone > 0 && milestone !== lastMilestone && count > lastCount) {
        showMilestone(milestone);
      }

      lastMilestone = milestone;
      lastCount = count;
    }

    onValue(roomRef, (snapshot) => {
      if (!snapshot.exists()) {
        set(roomRef, defaultState);
        render(defaultState);
        return;
      }
      render({ ...defaultState, ...snapshot.val() });
    });
  </script>
</body>
</html>
