<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pushup Counter Controller</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap');
    :root {
      --red: #ff2b2b;
      --green: #24d46b;
      --panel: rgba(8, 10, 13, .86);
      --panel2: rgba(18, 20, 24, .72);
      --line: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.58);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(255,43,43,.12), transparent 34%),
        radial-gradient(circle at 80% 100%, rgba(255,255,255,.08), transparent 42%),
        #07080a;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .app {
      width: min(1180px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(145deg, var(--panel), var(--panel2));
      box-shadow: 0 30px 90px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 28px 32px;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: -.03em; }
    .status {
      color: var(--green);
      font-weight: 800;
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--green);
      box-shadow: 0 0 14px rgba(36,212,107,.65);
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .section { padding: 30px 32px; border-bottom: 1px solid var(--line); }
    .section:nth-child(odd) { border-right: 1px solid var(--line); }
    label, .label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    input {
      width: 100%;
      height: 54px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.36);
      color: white;
      padding: 0 16px;
      font-size: 16px;
      outline: none;
    }
    input:focus {
      border-color: rgba(255,43,43,.8);
      box-shadow: 0 0 0 4px rgba(255,43,43,.13);
    }
    .row { display: flex; gap: 12px; align-items: center; }
    button {
      height: 58px;
      border: 1px solid rgba(255,255,255,.14);
      color: white;
      background: rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 0 20px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.26);
      background: rgba(255,255,255,.10);
    }
    button:active { transform: translateY(0px) scale(.99); }
    .primary {
      background: linear-gradient(180deg, #e92c2c, #b9101b);
      border-color: rgba(255,75,75,.48);
      box-shadow: 0 12px 24px rgba(255,43,43,.16);
    }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .buttons.small { grid-template-columns: repeat(2, 1fr); }
    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .theme-card {
      min-height: 124px;
      padding: 16px;
      text-align: left;
      position: relative;
    }
    .theme-card.active {
      border-color: rgba(255,43,43,.92);
      box-shadow: 0 0 0 3px rgba(255,43,43,.12);
    }
    .preview {
      height: 54px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      margin-bottom: 14px;
    }
    .preview.dark { background: linear-gradient(145deg, rgba(0,0,0,.82), rgba(32,35,42,.52)); }
    .preview.light { background: linear-gradient(145deg, rgba(255,255,255,.88), rgba(220,225,231,.52)); }
    .full { grid-column: 1 / -1; border-right: 0 !important; }
    .count-display {
      font-size: 54px;
      font-weight: 800;
      letter-spacing: -.04em;
      font-variant-numeric: tabular-nums;
      margin-top: 5px;
    }
    .muted {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
      overflow-wrap: anywhere;
    }
    .footer {
      padding: 22px 32px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .section:nth-child(odd) { border-right: 0; }
      .buttons { grid-template-columns: repeat(2, 1fr); }
      header, .section, .footer { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Pushup Counter Controller</h1>
        <div class="muted">Room-based Firebase controller for stream overlay.</div>
      </div>
      <div class="status"><span class="dot"></span><span id="status">CONNECTING</span></div>
    </header>

    <section class="grid">
      <div class="section">
        <label for="roomInput">Room</label>
        <div class="row">
          <input id="roomInput" value="brad-pushups" />
          <button id="loadRoom">LOAD</button>
        </div>
        <div class="muted" id="overlayUrl"></div>
      </div>

      <div class="section">
        <div class="label">Current Count</div>
        <div class="count-display" id="currentCount">0</div>
        <div class="muted" id="goalText">Goal: 10,000</div>
      </div>

      <div class="section">
        <div class="label">Theme</div>
        <div class="theme-grid">
          <button class="theme-card active" data-theme="dark"><div class="preview dark"></div>Dark Glass</button>
          <button class="theme-card" data-theme="light"><div class="preview light"></div>Normal Glass</button>
        </div>
      </div>

      <div class="section">
        <div class="label">Count Controls</div>
        <div class="buttons">
          <button class="primary" data-delta="1">+1</button>
          <button class="primary" data-delta="5">+5</button>
          <button class="primary" data-delta="10">+10</button>
          <button class="primary" data-delta="25">+25</button>
        </div>
        <div style="height:12px"></div>
        <div class="buttons small">
          <button data-delta="-1">-1</button>
          <button data-delta="-5">-5</button>
        </div>
      </div>

      <div class="section">
        <label for="setCount">Manual Set Count</label>
        <div class="row">
          <input id="setCount" type="number" min="0" placeholder="Enter count" />
          <button id="applyCount" class="primary">APPLY</button>
        </div>
      </div>

      <div class="section">
        <label for="setGoal">Set Goal</label>
        <div class="row">
          <input id="setGoal" type="number" min="1" placeholder="10000" />
          <button id="applyGoal">SET GOAL</button>
        </div>
      </div>

      <div class="section full">
        <div class="label">Quick Actions</div>
        <div class="buttons small">
          <button id="reset">RESET COUNT</button>
          <button id="copyOverlay">COPY OVERLAY URL</button>
        </div>
      </div>
    </section>

    <div class="footer">
      <span id="lastUpdated">Last updated: never</span>
      <span>Use the overlay URL in OBS / IRL Toolkit browser source.</span>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA4NYD9D6ZNbWkfrAm8pLBTqq33ajnKHTY",
      authDomain: "pushups-counter-72738.firebaseapp.com",
      databaseURL: "https://pushups-counter-72738-default-rtdb.firebaseio.com",
      projectId: "pushups-counter-72738",
      storageBucket: "pushups-counter-72738.firebasestorage.app",
      messagingSenderId: "935751593854",
      appId: "1:935751593854:web:16be8798a1e91519b78d2f"
    };

    const defaultState = { count: 0, goal: 10000, theme: "dark", updatedAt: Date.now() };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const roomInput = document.getElementById("roomInput");
    roomInput.value = params.get("room") || "brad-pushups";

    const statusEl = document.getElementById("status");
    const currentCount = document.getElementById("currentCount");
    const goalText = document.getElementById("goalText");
    const overlayUrl = document.getElementById("overlayUrl");
    const lastUpdated = document.getElementById("lastUpdated");
    const setCount = document.getElementById("setCount");
    const setGoal = document.getElementById("setGoal");

    let room = roomInput.value.trim() || "brad-pushups";
    let roomRef = ref(db, `rooms/${room}/pushups`);
    let state = { ...defaultState };
    let unsubscribe = null;

    const formatNumber = (n) => Number(n || 0).toLocaleString("en-US");

    function overlayLink() {
      const url = new URL("overlay.html", window.location.href);
      url.searchParams.set("room", room);
      return url.href;
    }

    function refreshUrls() {
      overlayUrl.textContent = `Overlay URL: ${overlayLink()}`;
      const url = new URL(window.location.href);
      url.searchParams.set("room", room);
      history.replaceState(null, "", url.toString());
    }

    function render(nextState) {
      state = { ...defaultState, ...nextState };
      currentCount.textContent = formatNumber(state.count);
      goalText.textContent = `Goal: ${formatNumber(state.goal)}`;
      setGoal.placeholder = state.goal || 10000;

      document.querySelectorAll(".theme-card").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.theme === state.theme);
      });

      if (state.updatedAt) {
        lastUpdated.textContent = `Last updated: ${new Date(state.updatedAt).toLocaleTimeString()}`;
      }
    }

    async function ensureRoom() {
      const snap = await get(roomRef);
      if (!snap.exists()) await set(roomRef, defaultState);
    }

    async function patch(data) {
      await update(roomRef, { ...data, updatedAt: Date.now() });
    }

    async function loadRoom() {
      room = roomInput.value.trim() || "brad-pushups";
      roomRef = ref(db, `rooms/${room}/pushups`);
      refreshUrls();

      if (unsubscribe) unsubscribe();
      await ensureRoom();

      unsubscribe = onValue(roomRef, (snapshot) => {
        statusEl.textContent = "CONNECTED";
        render(snapshot.exists() ? snapshot.val() : defaultState);
      }, (error) => {
        statusEl.textContent = "ERROR";
        console.error(error);
      });
    }

    document.getElementById("loadRoom").addEventListener("click", loadRoom);

    document.querySelectorAll("[data-delta]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const delta = Number(btn.dataset.delta || 0);
        const next = Math.max(0, Number(state.count || 0) + delta);
        await patch({ count: next });
      });
    });

    document.querySelectorAll(".theme-card").forEach(btn => {
      btn.addEventListener("click", async () => {
        await patch({ theme: btn.dataset.theme });
      });
    });

    document.getElementById("applyCount").addEventListener("click", async () => {
      const value = Math.max(0, Number(setCount.value || 0));
      await patch({ count: value });
      setCount.value = "";
    });

    document.getElementById("applyGoal").addEventListener("click", async () => {
      const value = Math.max(1, Number(setGoal.value || 10000));
      await patch({ goal: value });
      setGoal.value = "";
    });

    document.getElementById("reset").addEventListener("click", async () => {
      await patch({ count: 0 });
    });

    document.getElementById("copyOverlay").addEventListener("click", async () => {
      await navigator.clipboard.writeText(overlayLink());
      const btn = document.getElementById("copyOverlay");
      btn.textContent = "COPIED";
      setTimeout(() => btn.textContent = "COPY OVERLAY URL", 900);
    });

    refreshUrls();
    loadRoom();
  </script>
</body>
</html>
